<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Crime Clock</title>
  <link rel="stylesheet" href="style.css">
</head>

<body>

<div class="container">
  <h1>🚨 Crime Never Stops</h1>
  <p class="subtitle">Since you started watching...</p>

  <div id="counter">0</div>

  <p class="rate">
    A crime is reported every <span id="rate">3.5</span> seconds
  </p>

  <!-- NEW MESSAGE -->
  <p id="message">🟢 Monitoring incidents...</p>

  <button id="resetBtn">Restart</button>
</div>

<script src="script.js"></script>
</body>
</html>
